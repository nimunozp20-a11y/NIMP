<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo -->
  <rect width="512" height="512" rx="100" fill="#fdf8f5"/>
  
  <!-- Círculo rosa degradado -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#e8a0b0"/>
      <stop offset="100%" stop-color="#c0627a"/>
    </radialGradient>
  </defs>
  <circle cx="256" cy="220" r="160" fill="url(#bgGrad)"/>

  <!-- Flor de cerezo (sakura) -->
  <!-- Pétalo 1 - arriba -->
  <ellipse cx="256" cy="130" rx="28" ry="48" fill="#fdf8f5" opacity="0.92" transform="rotate(0 256 220)"/>
  <!-- Pétalo 2 - arriba derecha -->
  <ellipse cx="256" cy="130" rx="28" ry="48" fill="#fdf8f5" opacity="0.92" transform="rotate(72 256 220)"/>
  <!-- Pétalo 3 - abajo derecha -->
  <ellipse cx="256" cy="130" rx="28" ry="48" fill="#fdf8f5" opacity="0.92" transform="rotate(144 256 220)"/>
  <!-- Pétalo 4 - abajo izquierda -->
  <ellipse cx="256" cy="130" rx="28" ry="48" fill="#fdf8f5" opacity="0.92" transform="rotate(216 256 220)"/>
  <!-- Pétalo 5 - arriba izquierda -->
  <ellipse cx="256" cy="130" rx="28" ry="48" fill="#fdf8f5" opacity="0.92" transform="rotate(288 256 220)"/>

  <!-- Centro de la flor -->
  <circle cx="256" cy="220" r="22" fill="#f7d4dd"/>
  <circle cx="256" cy="220" r="10" fill="#c0627a"/>

  <!-- Texto "Mi Calendario" abajo -->
  <rect x="60" y="400" width="392" height="72" rx="16" fill="#c0627a"/>
  <text x="256" y="450" 
        font-family="Georgia, serif" 
        font-size="38" 
        font-weight="600"
        fill="#ffffff" 
        text-anchor="middle" 
        dominant-baseline="middle"
        letter-spacing="1">Mi Calendario</text>
</svg>
